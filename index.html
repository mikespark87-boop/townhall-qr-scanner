<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#10172a">
  <title>타운홀 운영자 QR 스캔</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    :root{--purple:#7c3aed;--pink:#ec4899;--green:#10b981;--red:#ef4444;--ink:#172033;--muted:#64748b}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;padding:18px;color:var(--ink);font-family:Pretendard,"Noto Sans KR",system-ui,sans-serif;background:radial-gradient(circle at top left,#ddd6fe,transparent 42%),linear-gradient(145deg,#f8fafc,#ecfeff)}
    .app{width:min(620px,100%);margin:auto}.header{margin-bottom:16px;text-align:center}.logo{display:grid;place-items:center;width:64px;height:64px;margin:0 auto 12px;border-radius:20px;background:linear-gradient(135deg,var(--purple),var(--pink));box-shadow:0 14px 30px rgba(124,58,237,.27);font-size:29px}.header h1{margin:0;font-size:27px}.header p{margin:7px 0;color:var(--muted);font-size:13px}.card{padding:18px;border:1px solid white;border-radius:23px;background:rgba(255,255,255,.95);box-shadow:0 22px 60px rgba(30,41,59,.14)}#reader{overflow:hidden;border-radius:17px;background:#111}#reader video{border-radius:17px}.manual{display:flex;gap:8px;margin-top:14px}.manual input,.auth input{width:100%;min-height:48px;padding:11px 13px;border:1px solid #e2e8f0;border-radius:12px;font:inherit}.btn{min-height:46px;padding:10px 17px;border:0;border-radius:12px;background:linear-gradient(135deg,var(--purple),#5b21b6);color:white;font:inherit;font-weight:800;cursor:pointer}.status{display:none;margin-top:16px;padding:24px 16px;border-radius:18px;text-align:center}.status.show{display:block}.status.success{background:#ecfdf5;color:#065f46}.status.error{background:#fff1f2;color:#9f1239}.icon{font-size:50px}.status h2{margin:7px 0}.status p{margin:4px 0}.again{margin-top:15px;background:var(--green)}.auth{position:fixed;inset:0;z-index:10;display:grid;place-items:center;padding:18px;background:rgba(15,23,42,.78);backdrop-filter:blur(9px)}.auth.hide{display:none}.auth-box{width:min(360px,100%);padding:28px;border-radius:22px;background:white;text-align:center}.auth-box h2{margin:8px 0}.auth-box p{color:var(--muted);font-size:12px}.auth-box .btn{width:100%;margin-top:9px}.error-text{min-height:19px;color:var(--red);font-size:12px}.hint{margin:13px 0 0;color:var(--muted);font-size:11px;text-align:center}
  </style>
</head>
<body>
  <main class="app"><header class="header"><div class="logo">📷</div><h1>운영자 QR 스캔</h1><p>참석자의 예약 QR을 카메라 중앙에 맞춰주세요.</p></header><section class="card"><div id="reader"></div><div class="manual"><input id="manual" placeholder="QR 내용 또는 이메일 직접 입력"><button id="manualBtn" class="btn">확인</button></div><div id="status" class="status"><div id="statusIcon" class="icon"></div><h2 id="statusTitle"></h2><p id="person"></p><p id="statusMessage"></p><button id="again" class="btn again">다음 참석자</button></div><p class="hint">카메라 정보와 QR 데이터는 기기 안에서 처리됩니다.</p></section></main>
  <div id="auth" class="auth"><form id="authForm" class="auth-box"><div style="font-size:38px">🔐</div><h2>운영자 인증</h2><p>Code.gs에 설정한 운영자 비밀번호를 입력하세요.</p><input id="password" type="password" autocomplete="current-password" required><div id="authError" class="error-text"></div><button class="btn">스캐너 시작</button></form></div>
  <script>
    const APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbzMXP2o3yypHAcfA3AMaJhdmgmjOrxJnV1Mfk2JA91FhEN7FpWQgGefk9kgmuX4zEXQzg/exec';
    let password='',scanner=null,busy=false,callbackNumber=0;
    const $=id=>document.getElementById(id);
    $('authForm').addEventListener('submit',async event=>{event.preventDefault();password=$('password').value.trim();if(!password)return;$('auth').classList.add('hide');await startScanner()});
    async function startScanner(){if(scanner)return;scanner=new Html5Qrcode('reader');try{const cameras=await Html5Qrcode.getCameras();if(!cameras||!cameras.length)throw new Error('사용 가능한 카메라가 없습니다.');const preferred=cameras.find(camera=>/back|rear|environment|후면/i.test(camera.label))||cameras[0];await scanner.start(preferred.id,{fps:10,qrbox:{width:250,height:250},aspectRatio:1},decoded=>checkIn(decoded),()=>{})}catch(error){scanner=null;showResult(false,null,'카메라를 열 수 없습니다. PC 웹캠 연결과 브라우저 카메라 권한을 확인해 주세요.')}}
    function callScan(data){return new Promise((resolve,reject)=>{const name='townhallScanCallback'+(++callbackNumber),script=document.createElement('script'),timer=setTimeout(()=>finish(new Error('서버 응답 시간이 초과되었습니다.')),15000);function finish(error,value){clearTimeout(timer);delete window[name];script.remove();error?reject(error):resolve(value)}window[name]=value=>finish(null,value);script.onerror=()=>finish(new Error('출석 서버에 연결할 수 없습니다.'));script.src=APPS_SCRIPT_URL+'?action=scan&callback='+name+'&password='+encodeURIComponent(password)+'&data='+encodeURIComponent(data)+'&_='+Date.now();document.body.appendChild(script)})}
    async function checkIn(data){if(busy||!data)return;busy=true;try{if(scanner)await scanner.pause(true);const result=await callScan(data);if(!result.success)throw new Error(result.error||'출석 처리에 실패했습니다.');showResult(true,result.attendee,result.alreadyScanned?'이미 출석 처리된 참석자입니다.':'출석 처리가 완료되었습니다.')}catch(error){showResult(false,null,error.message)}}
    function showResult(success,person,message){$('status').className='status show '+(success?'success':'error');$('statusIcon').textContent=success?'✅':'⚠️';$('statusTitle').textContent=success?(person.name||'출석 완료'):'처리 실패';$('person').textContent=success?[(person.department||''),(person.email||'')].filter(Boolean).join(' · '):'';$('statusMessage').textContent=message}
    $('again').addEventListener('click',()=>{$('status').className='status';busy=false;if(scanner)scanner.resume()});$('manualBtn').addEventListener('click',()=>checkIn($('manual').value.trim()));
  </script>
</body>
</html>
